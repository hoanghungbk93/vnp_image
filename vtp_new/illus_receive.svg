<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Locker with open door -->
  <rect x="20" y="30" width="120" height="80" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <line x1="50" y1="30" x2="50" y2="110" stroke="#4CAF50" stroke-width="2"/>
  <line x1="80" y1="30" x2="80" y2="110" stroke="#4CAF50" stroke-width="2"/>
  <line x1="110" y1="30" x2="110" y2="110" stroke="#4CAF50" stroke-width="2"/>

  <!-- Open door effect -->
  <path d="M80 30L95 20L95 100L80 110" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2"/>

  <!-- Package coming out -->
  <rect x="55" y="55" width="35" height="30" rx="2" fill="#FFE0B2" stroke="#FF9800" stroke-width="2"/>
  <path d="M55 65H90" stroke="#FF9800" stroke-width="1.5"/>

  <!-- Arrow down (receiving) -->
  <path d="M125 80V130" stroke="#2E7D32" stroke-width="4" stroke-linecap="round"/>
  <path d="M115 120L125 130L135 120" stroke="#2E7D32" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Hand receiving -->
  <ellipse cx="125" cy="145" rx="20" ry="8" fill="#FFE0B2" stroke="#FF9800" stroke-width="2"/>
</svg>
