<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- QR Code for payment -->
  <rect x="10" y="10" width="180" height="180" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2"/>

  <!-- QR Pattern corners -->
  <rect x="20" y="20" width="40" height="40" fill="#333"/>
  <rect x="140" y="20" width="40" height="40" fill="#333"/>
  <rect x="20" y="140" width="40" height="40" fill="#333"/>

  <rect x="25" y="25" width="30" height="30" fill="white"/>
  <rect x="145" y="25" width="30" height="30" fill="white"/>
  <rect x="25" y="145" width="30" height="30" fill="white"/>

  <rect x="30" y="30" width="20" height="20" fill="#333"/>
  <rect x="150" y="30" width="20" height="20" fill="#333"/>
  <rect x="30" y="150" width="20" height="20" fill="#333"/>

  <!-- Center pattern -->
  <rect x="70" y="20" width="8" height="8" fill="#333"/>
  <rect x="85" y="28" width="8" height="8" fill="#333"/>
  <rect x="100" y="20" width="8" height="8" fill="#333"/>
  <rect x="115" y="28" width="8" height="8" fill="#333"/>

  <rect x="20" y="70" width="8" height="8" fill="#333"/>
  <rect x="28" y="85" width="8" height="8" fill="#333"/>
  <rect x="20" y="100" width="8" height="8" fill="#333"/>
  <rect x="28" y="115" width="8" height="8" fill="#333"/>

  <!-- Data area -->
  <rect x="70" y="70" width="60" height="60" fill="#F5F5F5"/>
  <rect x="75" y="75" width="12" height="12" fill="#333"/>
  <rect x="94" y="75" width="12" height="12" fill="#333"/>
  <rect x="113" y="75" width="12" height="12" fill="#333"/>
  <rect x="75" y="94" width="12" height="12" fill="#333"/>
  <rect x="113" y="94" width="12" height="12" fill="#333"/>
  <rect x="75" y="113" width="12" height="12" fill="#333"/>
  <rect x="94" y="113" width="12" height="12" fill="#333"/>
  <rect x="113" y="113" width="12" height="12" fill="#333"/>

  <!-- Bottom right pattern -->
  <rect x="140" y="70" width="8" height="8" fill="#333"/>
  <rect x="155" y="78" width="8" height="8" fill="#333"/>
  <rect x="170" y="70" width="8" height="8" fill="#333"/>
  <rect x="140" y="95" width="8" height="8" fill="#333"/>
  <rect x="155" y="103" width="8" height="8" fill="#333"/>
  <rect x="170" y="95" width="8" height="8" fill="#333"/>

  <rect x="70" y="140" width="8" height="8" fill="#333"/>
  <rect x="85" y="148" width="8" height="8" fill="#333"/>
  <rect x="100" y="140" width="8" height="8" fill="#333"/>
  <rect x="115" y="148" width="8" height="8" fill="#333"/>

  <rect x="140" y="140" width="40" height="40" fill="#2E7D32"/>
  <text x="160" y="165" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">PAY</text>
</svg>
