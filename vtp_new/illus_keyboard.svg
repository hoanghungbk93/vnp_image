<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Keyboard base -->
  <rect x="15" y="35" width="90" height="60" rx="8" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="2"/>

  <!-- Keys row 1 -->
  <rect x="22" y="42" width="14" height="14" rx="2" fill="white" stroke="#E0E0E0"/>
  <rect x="40" y="42" width="14" height="14" rx="2" fill="white" stroke="#E0E0E0"/>
  <rect x="58" y="42" width="14" height="14" rx="2" fill="white" stroke="#E0E0E0"/>
  <rect x="76" y="42" width="14" height="14" rx="2" fill="white" stroke="#E0E0E0"/>

  <!-- Keys row 2 -->
  <rect x="22" y="60" width="14" height="14" rx="2" fill="white" stroke="#E0E0E0"/>
  <rect x="40" y="60" width="14" height="14" rx="2" fill="white" stroke="#E0E0E0"/>
  <rect x="58" y="60" width="14" height="14" rx="2" fill="white" stroke="#E0E0E0"/>
  <rect x="76" y="60" width="14" height="14" rx="2" fill="white" stroke="#E0E0E0"/>

  <!-- Space bar -->
  <rect x="30" y="78" width="52" height="12" rx="2" fill="#2E7D32"/>

  <!-- Numbers on keys -->
  <text x="29" y="53" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">1</text>
  <text x="47" y="53" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">2</text>
  <text x="65" y="53" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">3</text>
  <text x="83" y="53" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">4</text>
  <text x="29" y="71" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">5</text>
  <text x="47" y="71" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">6</text>
  <text x="65" y="71" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">7</text>
  <text x="83" y="71" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#333">8</text>

  <!-- Hand pointer -->
  <circle cx="95" cy="25" r="8" fill="#FFE0B2" stroke="#FF9800" stroke-width="2"/>
  <path d="M95 33V50" stroke="#FF9800" stroke-width="3" stroke-linecap="round"/>
</svg>
