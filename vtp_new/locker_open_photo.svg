<svg width="300" height="350" viewBox="0 0 300 350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Locker cabinet -->
  <rect x="30" y="20" width="240" height="310" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="3"/>

  <!-- Row 1 -->
  <rect x="45" y="35" width="70" height="55" rx="4" fill="white" stroke="#4CAF50" stroke-width="2"/>
  <rect x="120" y="35" width="70" height="55" rx="4" fill="white" stroke="#4CAF50" stroke-width="2"/>
  <rect x="195" y="35" width="60" height="55" rx="4" fill="white" stroke="#4CAF50" stroke-width="2"/>

  <!-- Row 2 with open door -->
  <rect x="45" y="95" width="70" height="55" rx="4" fill="white" stroke="#4CAF50" stroke-width="2"/>
  <rect x="120" y="95" width="70" height="55" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="3"/>
  <rect x="195" y="95" width="60" height="55" rx="4" fill="white" stroke="#4CAF50" stroke-width="2"/>

  <!-- Open door visual -->
  <path d="M190 95L210 85L210 160L190 150" fill="#A5D6A7" stroke="#2E7D32" stroke-width="2"/>

  <!-- Row 3 -->
  <rect x="45" y="155" width="70" height="55" rx="4" fill="white" stroke="#4CAF50" stroke-width="2"/>
  <rect x="120" y="155" width="70" height="55" rx="4" fill="white" stroke="#4CAF50" stroke-width="2"/>
  <rect x="195" y="155" width="60" height="55" rx="4" fill="white" stroke="#4CAF50" stroke-width="2"/>

  <!-- Row 4 -->
  <rect x="45" y="215" width="100" height="45" rx="4" fill="white" stroke="#4CAF50" stroke-width="2"/>
  <rect x="150" y="215" width="105" height="45" rx="4" fill="white" stroke="#4CAF50" stroke-width="2"/>

  <!-- Row 5 -->
  <rect x="45" y="265" width="100" height="50" rx="4" fill="white" stroke="#4CAF50" stroke-width="2"/>
  <rect x="150" y="265" width="105" height="50" rx="4" fill="white" stroke="#4CAF50" stroke-width="2"/>

  <!-- Locker number badge -->
  <circle cx="155" cy="122" r="18" fill="#2E7D32"/>
  <text x="155" y="128" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">05</text>

  <!-- Handles -->
  <circle cx="110" cy="62" r="4" fill="#4CAF50"/>
  <circle cx="185" cy="62" r="4" fill="#4CAF50"/>
  <circle cx="250" cy="62" r="4" fill="#4CAF50"/>
  <circle cx="110" cy="122" r="4" fill="#4CAF50"/>
  <circle cx="250" cy="122" r="4" fill="#4CAF50"/>
  <circle cx="110" cy="182" r="4" fill="#4CAF50"/>
  <circle cx="185" cy="182" r="4" fill="#4CAF50"/>
  <circle cx="250" cy="182" r="4" fill="#4CAF50"/>
</svg>
