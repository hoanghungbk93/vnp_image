<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- QR Code frame -->
  <rect x="20" y="20" width="80" height="80" rx="8" fill="white" stroke="#2E7D32" stroke-width="3"/>

  <!-- QR Code pattern -->
  <rect x="30" y="30" width="20" height="20" fill="#2E7D32"/>
  <rect x="70" y="30" width="20" height="20" fill="#2E7D32"/>
  <rect x="30" y="70" width="20" height="20" fill="#2E7D32"/>

  <rect x="35" y="35" width="10" height="10" fill="white"/>
  <rect x="75" y="35" width="10" height="10" fill="white"/>
  <rect x="35" y="75" width="10" height="10" fill="white"/>

  <!-- Center pattern -->
  <rect x="55" y="45" width="10" height="10" fill="#2E7D32"/>
  <rect x="55" y="65" width="10" height="10" fill="#2E7D32"/>
  <rect x="70" y="55" width="10" height="10" fill="#2E7D32"/>

  <!-- Scan lines -->
  <path d="M10 35V20H25" stroke="#4CAF50" stroke-width="4" stroke-linecap="round"/>
  <path d="M95 20H110V35" stroke="#4CAF50" stroke-width="4" stroke-linecap="round"/>
  <path d="M110 85V100H95" stroke="#4CAF50" stroke-width="4" stroke-linecap="round"/>
  <path d="M25 100H10V85" stroke="#4CAF50" stroke-width="4" stroke-linecap="round"/>
</svg>
