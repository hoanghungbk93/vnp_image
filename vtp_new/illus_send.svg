<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Package box -->
  <rect x="40" y="50" width="70" height="60" rx="4" fill="#FFE0B2" stroke="#FF9800" stroke-width="3"/>
  <path d="M40 70H110" stroke="#FF9800" stroke-width="2"/>
  <rect x="60" y="50" width="30" height="25" fill="#FFCC80" stroke="#FF9800" stroke-width="2"/>

  <!-- Arrow up (sending) -->
  <path d="M125 90V40" stroke="#2E7D32" stroke-width="4" stroke-linecap="round"/>
  <path d="M115 50L125 40L135 50" stroke="#2E7D32" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Locker -->
  <rect x="20" y="115" width="120" height="30" rx="4" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2"/>
  <line x1="50" y1="115" x2="50" y2="145" stroke="#4CAF50" stroke-width="2"/>
  <line x1="80" y1="115" x2="80" y2="145" stroke="#4CAF50" stroke-width="2"/>
  <line x1="110" y1="115" x2="110" y2="145" stroke="#4CAF50" stroke-width="2"/>

  <!-- Door handles -->
  <circle cx="45" cy="130" r="3" fill="#4CAF50"/>
  <circle cx="75" cy="130" r="3" fill="#4CAF50"/>
  <circle cx="105" cy="130" r="3" fill="#4CAF50"/>
  <circle cx="135" cy="130" r="3" fill="#4CAF50"/>
</svg>
